<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <defs>
    <linearGradient id="motoInfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ebf8ff"/>
      <stop offset="100%" style="stop-color:#bee3f8"/>
    </linearGradient>
  </defs>
  <rect width="600" height="480" fill="url(#motoInfGrad)"/>
  <text x="300" y="50" text-anchor="middle" fill="#1e3a5f" font-family="Georgia, serif" font-size="24" font-weight="bold">Motorcycle Accidents: Quick Case Roadmap</text>
  <rect x="40" y="90" width="520" height="70" rx="8" fill="#fff" stroke="#2c5282" stroke-width="1"/>
  <text x="300" y="125" text-anchor="middle" fill="#1e3a5f" font-size="20" font-weight="bold">1. Scene &amp; Evidence Preservation</text>
  <text x="300" y="148" text-anchor="middle" fill="#2c5282" font-size="16">Photos, witness statements, vehicle inspection</text>
  <rect x="40" y="175" width="520" height="70" rx="8" fill="#fff" stroke="#2c5282" stroke-width="1"/>
  <text x="300" y="210" text-anchor="middle" fill="#1e3a5f" font-size="20" font-weight="bold">2. Liability Analysis</text>
  <text x="300" y="233" text-anchor="middle" fill="#2c5282" font-size="16">Driver fault, lane splitting, visibility issues</text>
  <rect x="40" y="260" width="520" height="70" rx="8" fill="#fff" stroke="#2c5282" stroke-width="1"/>
  <text x="300" y="295" text-anchor="middle" fill="#1e3a5f" font-size="20" font-weight="bold">3. Injury Documentation</text>
  <text x="300" y="318" text-anchor="middle" fill="#2c5282" font-size="16">Orthopedic, head trauma, road rash severity</text>
  <rect x="40" y="345" width="520" height="70" rx="8" fill="#fff" stroke="#2c5282" stroke-width="1"/>
  <text x="300" y="380" text-anchor="middle" fill="#1e3a5f" font-size="20" font-weight="bold">4. Full Damages Recovery</text>
  <text x="300" y="403" text-anchor="middle" fill="#2c5282" font-size="16">Medical, lost wages, pain and suffering</text>
</svg>
