<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <defs>
    <linearGradient id="rideshareInfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f4f8"/>
      <stop offset="100%" style="stop-color:#e8dce8"/>
    </linearGradient>
  </defs>
  <rect width="600" height="480" fill="url(#rideshareInfGrad)"/>
  <text x="300" y="50" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="24" font-weight="bold">Uber &amp; Lyft Accidents: Quick Case Roadmap</text>
  <rect x="40" y="90" width="520" height="70" rx="8" fill="#fff" stroke="#0f3460" stroke-width="1"/>
  <text x="300" y="125" text-anchor="middle" fill="#1a1a2e" font-size="20" font-weight="bold">1. Preserve Trip &amp; App Data</text>
  <text x="300" y="148" text-anchor="middle" fill="#0f3460" font-size="16">Receipts, route, driver info, incident report</text>
  <rect x="40" y="175" width="520" height="70" rx="8" fill="#fff" stroke="#0f3460" stroke-width="1"/>
  <text x="300" y="210" text-anchor="middle" fill="#1a1a2e" font-size="20" font-weight="bold">2. Coverage Layer Analysis</text>
  <text x="300" y="233" text-anchor="middle" fill="#0f3460" font-size="16">Driver personal, rideshare, and platform policies</text>
  <rect x="40" y="260" width="520" height="70" rx="8" fill="#fff" stroke="#0f3460" stroke-width="1"/>
  <text x="300" y="295" text-anchor="middle" fill="#1a1a2e" font-size="20" font-weight="bold">3. Liability Determination</text>
  <text x="300" y="318" text-anchor="middle" fill="#0f3460" font-size="16">Driver, other motorist, or platform responsibility</text>
  <rect x="40" y="345" width="520" height="70" rx="8" fill="#fff" stroke="#0f3460" stroke-width="1"/>
  <text x="300" y="380" text-anchor="middle" fill="#1a1a2e" font-size="20" font-weight="bold">4. Full Damages Recovery</text>
  <text x="300" y="403" text-anchor="middle" fill="#0f3460" font-size="16">Medical, lost wages, pain and suffering</text>
