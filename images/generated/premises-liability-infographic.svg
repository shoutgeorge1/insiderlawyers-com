<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <defs>
    <linearGradient id="premisesInfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eceff1"/>
      <stop offset="100%" style="stop-color:#cfd8dc"/>
    </linearGradient>
  </defs>
  <rect width="600" height="480" fill="url(#premisesInfGrad)"/>
  <text x="300" y="50" text-anchor="middle" fill="#37474f" font-family="Georgia, serif" font-size="26" font-weight="bold">Premises Liability: Quick Case Roadmap</text>
  <rect x="40" y="90" width="520" height="70" rx="8" fill="#fff" stroke="#546e7a" stroke-width="1"/>
  <text x="300" y="125" text-anchor="middle" fill="#37474f" font-size="20" font-weight="bold">1. Notice &amp; Hazard Evidence</text>
  <text x="300" y="148" text-anchor="middle" fill="#546e7a" font-size="16">Photos, incident reports, maintenance records</text>
  <rect x="40" y="175" width="520" height="70" rx="8" fill="#fff" stroke="#546e7a" stroke-width="1"/>
  <text x="300" y="210" text-anchor="middle" fill="#37474f" font-size="20" font-weight="bold">2. Duty of Care</text>
  <text x="300" y="233" text-anchor="middle" fill="#546e7a" font-size="16">Property owner, tenant, or manager responsibility</text>
  <rect x="40" y="260" width="520" height="70" rx="8" fill="#fff" stroke="#546e7a" stroke-width="1"/>
  <text x="300" y="295" text-anchor="middle" fill="#37474f" font-size="20" font-weight="bold">3. Causation Proof</text>
  <text x="300" y="318" text-anchor="middle" fill="#546e7a" font-size="16">Link hazard to injury; overcome comparative fault</text>
  <rect x="40" y="345" width="520" height="70" rx="8" fill="#fff" stroke="#546e7a" stroke-width="1"/>
  <text x="300" y="380" text-anchor="middle" fill="#37474f" font-size="20" font-weight="bold">4. Damages Recovery</text>
  <text x="300" y="403" text-anchor="middle" fill="#546e7a" font-size="16">Medical, wages, pain and suffering</text>
</svg>
