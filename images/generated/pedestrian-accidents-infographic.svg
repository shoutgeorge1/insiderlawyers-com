  <text x="300" y="380" text-anchor="middle" fill="#22543d" font-size="20" font-weight="bold">4. Full Recovery Claim</text>
  <text x="300" y="403" text-anchor="middle" fill="#276749" font-size="16">Medical, wages, pain, future care</text>
