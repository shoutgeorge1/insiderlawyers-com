<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <defs>
    <linearGradient id="pedInfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fff4"/>
      <stop offset="100%" style="stop-color:#c6f6d5"/>
    </linearGradient>
  </defs>
  <rect width="600" height="480" fill="url(#pedInfGrad)"/>
  <text x="300" y="50" text-anchor="middle" fill="#22543d" font-family="Georgia, serif" font-size="24" font-weight="bold">Pedestrian Accidents: Quick Case Roadmap</text>
  <rect x="40" y="90" width="520" height="70" rx="8" fill="#fff" stroke="#276749" stroke-width="1"/>
  <text x="300" y="125" text-anchor="middle" fill="#22543d" font-size="20" font-weight="bold">1. Immediate Scene Investigation</text>
  <text x="300" y="148" text-anchor="middle" fill="#276749" font-size="16">Photos, signals, witness statements</text>
  <rect x="40" y="175" width="520" height="70" rx="8" fill="#fff" stroke="#276749" stroke-width="1"/>
  <text x="300" y="210" text-anchor="middle" fill="#22543d" font-size="20" font-weight="bold">2. Right-of-Way &amp; Fault</text>
  <text x="300" y="233" text-anchor="middle" fill="#276749" font-size="16">Signal timing, visibility, speed reconstruction</text>
  <rect x="40" y="260" width="520" height="70" rx="8" fill="#fff" stroke="#276749" stroke-width="1"/>
  <text x="300" y="295" text-anchor="middle" fill="#22543d" font-size="20" font-weight="bold">3. Injury &amp; Damages Documentation</text>
  <text x="300" y="318" text-anchor="middle" fill="#276749" font-size="16">Trauma severity, long-term care needs</text>
