<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <defs>
    <linearGradient id="truckInfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7fbff"/>
      <stop offset="100%" style="stop-color:#e6f0fa"/>
    </linearGradient>
  </defs>
  <rect width="600" height="480" fill="url(#truckInfGrad)"/>
  <text x="300" y="50" text-anchor="middle" fill="#1a365d" font-family="Georgia, serif" font-size="26" font-weight="bold">Truck Accidents: Quick Case Roadmap</text>
  <rect x="40" y="90" width="520" height="70" rx="8" fill="#fff" stroke="#2c5282" stroke-width="1"/>
  <text x="300" y="125" text-anchor="middle" fill="#1a365d" font-size="20" font-weight="bold">1. Preserve Evidence</text>
  <text x="300" y="148" text-anchor="middle" fill="#2c5282" font-size="16">Black box data, driver logs, maintenance records</text>
  <rect x="40" y="175" width="520" height="70" rx="8" fill="#fff" stroke="#2c5282" stroke-width="1"/>
  <text x="300" y="210" text-anchor="middle" fill="#1a365d" font-size="20" font-weight="bold">2. Establish Liability</text>
  <text x="300" y="233" text-anchor="middle" fill="#2c5282" font-size="16">Driver, carrier, maintenance, and manufacturer fault</text>
  <rect x="40" y="260" width="520" height="70" rx="8" fill="#fff" stroke="#2c5282" stroke-width="1"/>
  <text x="300" y="295" text-anchor="middle" fill="#1a365d" font-size="20" font-weight="bold">3. Document Damages</text>
  <text x="300" y="318" text-anchor="middle" fill="#2c5282" font-size="16">Medical costs, lost wages, pain and suffering</text>
  <rect x="40" y="345" width="520" height="70" rx="8" fill="#fff" stroke="#2c5282" stroke-width="1"/>
  <text x="300" y="380" text-anchor="middle" fill="#1a365d" font-size="20" font-weight="bold">4. Trial-Ready Strategy</text>
  <text x="300" y="403" text-anchor="middle" fill="#2c5282" font-size="16">Build leverage for settlement or courtroom</text>
</svg>
