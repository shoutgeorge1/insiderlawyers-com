<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <defs>
    <linearGradient id="criteriaInfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f6f6"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
  </defs>
  <rect width="600" height="480" fill="url(#criteriaInfGrad)"/>
  <text x="300" y="50" text-anchor="middle" fill="#0d4f4f" font-family="Georgia, serif" font-size="26" font-weight="bold">Referral Criteria: Quick Case Roadmap</text>
  <rect x="40" y="90" width="520" height="70" rx="8" fill="#fff" stroke="#0e6b6b" stroke-width="1"/>
  <text x="300" y="125" text-anchor="middle" fill="#0d4f4f" font-size="20" font-weight="bold">1. Case Type Match</text>
  <text x="300" y="148" text-anchor="middle" fill="#0e6b6b" font-size="16">Catastrophic, wrongful death, truck, brain injury</text>
  <rect x="40" y="175" width="520" height="70" rx="8" fill="#fff" stroke="#0e6b6b" stroke-width="1"/>
  <text x="300" y="210" text-anchor="middle" fill="#0d4f4f" font-size="20" font-weight="bold">2. Liability &amp; Damages Threshold</text>
  <text x="300" y="233" text-anchor="middle" fill="#0e6b6b" font-size="16">Clear fault, significant injuries, adequate limits</text>
  <rect x="40" y="260" width="520" height="70" rx="8" fill="#fff" stroke="#0e6b6b" stroke-width="1"/>
  <text x="300" y="295" text-anchor="middle" fill="#0d4f4f" font-size="20" font-weight="bold">3. Statute of Limitations</text>
  <text x="300" y="318" text-anchor="middle" fill="#0e6b6b" font-size="16">Sufficient time for investigation and litigation</text>
  <rect x="40" y="345" width="520" height="70" rx="8" fill="#fff" stroke="#0e6b6b" stroke-width="1"/>
  <text x="300" y="380" text-anchor="middle" fill="#0d4f4f" font-size="20" font-weight="bold">4. Trial Readiness Commitment</text>
  <text x="300" y="403" text-anchor="middle" fill="#0e6b6b" font-size="16">Client and referring attorney alignment</text>
</svg>
