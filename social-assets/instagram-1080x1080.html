<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Beyond the Gavel | Donn Christensen | 1080×1080</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; }
    .card {
      width: 1080px; height: 1080px;
      position: relative;
      overflow: hidden;
    }
    .card__hero {
      position: absolute; inset: 0;
    }
    .card__hero img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 10%;
      display: block;
    }
    .card__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,25,41,0.95) 0%, rgba(10,25,41,0.6) 40%, rgba(10,25,41,0.1) 70%, transparent 100%);
    }
    .card__content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      padding: 60px 64px;
    }
    .card__podcast {
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.25em;
      color: #d4af37;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .card__title {
      font-size: 52px; font-weight: 800;
      color: #fff; line-height: 1.1;
      margin-bottom: 12px;
    }
    .card__sub {
      font-size: 24px; color: rgba(255,255,255,0.7);
      font-weight: 500; margin-bottom: 14px;
    }
    .card__meta {
      font-size: 20px; color: rgba(255,255,255,0.5);
    }
    .card__badge {
      position: absolute;
      top: 36px; right: 36px;
      width: 100px; height: 100px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,255,255,0.12);
      z-index: 3;
    }
    .card__badge img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card__hero">
      <img src="https://www.insiderlawyers.com/images/la/donn-christensen.webp" alt="Donn Christensen">
    </div>
    <div class="card__overlay"></div>
    <div class="card__content">
      <p class="card__podcast">Podcast</p>
      <h1 class="card__title">Beyond The Gavel</h1>
      <p class="card__sub">With Donn Christensen</p>
      <p class="card__meta">Event by Rodney Peyton, MD, OBE · Fri, Feb 20, 2026</p>
    </div>
    <div class="card__badge">
      <img src="https://is1-ssl.mzstatic.com/image/thumb/Podcasts211/v4/0e/8f/ad/0e8fadd2-9d01-0edb-79a2-2a185f6d9be0/mza_7050964826481513520.jpg/1200x1200bf-60.jpg" alt="Beyond the Gavel Podcast">
    </div>
  </div>
</body>
</html>
