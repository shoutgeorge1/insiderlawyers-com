<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Beyond the Gavel | Donn Christensen | Minimal 1080×1080</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; }
    .card {
      width: 1080px; height: 1080px;
      position: relative;
      overflow: hidden;
    }
    .card__hero {
      position: absolute; inset: 0;
    }
    .card__hero img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 10%;
      display: block;
    }
    .card__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,25,41,0.7) 0%, transparent 40%);
    }
    .card__badge {
      position: absolute;
      bottom: 36px; right: 36px;
      width: 100px; height: 100px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,255,255,0.12);
      z-index: 3;
    }
    .card__badge img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .card__label {
      position: absolute;
      bottom: 44px; left: 48px;
      z-index: 3;
    }
    .card__label span {
      display: block;
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.2em;
      color: #d4af37;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .card__label h1 {
      font-size: 36px; font-weight: 800;
      color: #fff; line-height: 1.15;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card__hero">
      <img src="https://www.insiderlawyers.com/images/la/donn-christensen.webp" alt="Donn Christensen">
    </div>
    <div class="card__overlay"></div>
    <div class="card__label">
      <span>Podcast</span>
      <h1>Beyond The Gavel</h1>
    </div>
    <div class="card__badge">
      <img src="https://is1-ssl.mzstatic.com/image/thumb/Podcasts211/v4/0e/8f/ad/0e8fadd2-9d01-0edb-79a2-2a185f6d9be0/mza_7050964826481513520.jpg/1200x1200bf-60.jpg" alt="Beyond the Gavel Podcast">
    </div>
  </div>
</body>
</html>
